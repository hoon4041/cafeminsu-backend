services:
  mysql:
    image: mysql:8.0
    container_name: cafeminsu-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: cafeminsu
      MYSQL_USER: cafeminsu
      MYSQL_PASSWORD: cafeminsu
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - cafeminsu-mysql-data:/var/lib/mysql
      # 컨테이너 첫 기동 시 자동 실행되는 SQL (DDL 자동 적용)
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cafeminsu-mysql-data:
