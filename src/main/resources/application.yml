spring:
  profiles:
    active: local
  application:
    name: cafeminsu

  jpa:
    hibernate:
      # local/dev: validate (DDL은 별도 sql로 관리)
      # 절대 update/create-drop 쓰지 마세요. 운영 데이터 날아갑니다.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        # naming strategy: 엔티티의 @Column(name=...)를 그대로 사용
    open-in-view: false   # 트랜잭션 밖 lazy loading 방지

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET:change-me-this-is-a-dev-secret-must-be-at-least-32-bytes-long-for-hs256}
  access-token-validity-seconds: 3600        # 1시간
  refresh-token-validity-seconds: 1209600    # 14일 (2주)

# 외부 서비스 키 (실제 값은 환경변수 또는 application-{profile}.yml로 분리)
kakao:
  client-id: ${KAKAO_CLIENT_ID:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI:}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

portone:
  api-key: ${PORTONE_API_KEY:}
  api-secret: ${PORTONE_API_SECRET:}

fcm:
  service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:firebase-service-account.json}

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# 로깅
logging:
  level:
    root: INFO
    com.cafeminsu: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # SQL 파라미터 값 보고 싶을 때
