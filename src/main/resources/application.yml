spring:
  profiles:
    active: local
  application:
    name: cafeminsu

  jpa:
    hibernate:
      # local/dev: validate (DDL은 별도 sql로 관리)
      # 절대 update/create-drop 쓰지 마세요. 운영 데이터 날아갑니다.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        # naming strategy: 엔티티의 @Column(name=...)를 그대로 사용
    open-in-view: false   # 트랜잭션 밖 lazy loading 방지

server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET:change-me-this-is-a-dev-secret-must-be-at-least-32-bytes-long-for-hs256}
  access-token-validity-seconds: 3600        # 1시간
  refresh-token-validity-seconds: 1209600    # 14일 (2주)

# 외부 서비스 키 (실제 값은 환경변수 또는 application-{profile}.yml로 분리)
# 카카오 로그인은 클라이언트가 전달한 access_token으로 /v2/user/me만 호출하므로
# client-id/secret/redirect-uri 설정이 필요 없다.
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
  # SSAFY GMS 프록시 경유(기본). 실제 OpenAI 경로를 그대로 붙이는 투명 프록시라
  # Chat Completions 경로가 그대로 동작한다. 정식 OpenAI로 바꾸려면 이 값만 교체.
  base-url: ${OPENAI_BASE_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions}

portone:
  api-key: ${PORTONE_API_KEY:}
  api-secret: ${PORTONE_API_SECRET:}

fcm:
  service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:firebase-service-account.json}

# 스탬프 적립 정책
# drink-categories: 스탬프 적립 대상(음료)으로 인정할 메뉴 category 목록 (대소문자·공백 무시).
#   매장에서 실제 사용하는 category 값에 맞게 조정하세요.
stamp:
  drink-categories: 커피,음료,에이드,티,스무디,라떼

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# 로깅
logging:
  level:
    root: INFO
    com.cafeminsu: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # SQL 파라미터 값 보고 싶을 때
