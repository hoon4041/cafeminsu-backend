spring:
  profiles:
    active: local
  application:
    name: cafeminsu

  jpa:
    hibernate:
      # local/dev: validate (DDL은 별도 sql로 관리)
      # 절대 update/create-drop 쓰지 마세요. 운영 데이터 날아갑니다.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        # naming strategy: 엔티티의 @Column(name=...)를 그대로 사용
    open-in-view: false   # 트랜잭션 밖 lazy loading 방지

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET:change-me-this-is-a-dev-secret-must-be-at-least-32-bytes-long-for-hs256}
  access-token-validity-seconds: 3600        # 1시간
  refresh-token-validity-seconds: 1209600    # 14일 (2주)

# 외부 서비스 키 (실제 값은 환경변수 또는 application-{profile}.yml로 분리)
# 카카오 로그인은 클라이언트가 전달한 access_token으로 /v2/user/me만 호출하므로
# client-id/secret/redirect-uri 설정이 필요 없다.
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
  # SSAFY GMS 프록시 경유(기본). 실제 OpenAI 경로를 그대로 붙이는 투명 프록시라
  # Chat Completions 경로가 그대로 동작한다. 정식 OpenAI로 바꾸려면 이 값만 교체.
  base-url: ${OPENAI_BASE_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions}

# 카카오페이 (신규 오픈API: open-api.kakaopay.com)
# secret-key는 서버 환경변수로만 주입한다(절대 커밋/로그 금지). 비어 있으면 KakaoPayClient가 mock으로 동작.
# cid: 테스트 TC0ONETIME, 운영은 카카오페이에서 발급받은 CID로 KAKAOPAY_CID 환경변수 설정.
kakaopay:
  cid: ${KAKAOPAY_CID:TC0ONETIME}
  secret-key: ${KAKAOPAY_SECRET_KEY:}
  base-url: ${KAKAOPAY_BASE_URL:https://open-api.kakaopay.com}
  # 카카오페이 인증 완료 후 돌아올 앱 딥링크 (화이트리스트: cafeminsu://kakaopay?pg_token=...)
  approval-url: ${KAKAOPAY_APPROVAL_URL:cafeminsu://kakaopay}
  cancel-url: ${KAKAOPAY_CANCEL_URL:cafeminsu://kakaopay}
  fail-url: ${KAKAOPAY_FAIL_URL:cafeminsu://kakaopay}

fcm:
  service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:firebase-service-account.json}

# 기프티콘 선물 공유 링크
# 받는 사람이 누르면 claim(등록) 페이지/딥링크로 진입한다. 최종 URL = {base}?code=GFT-XXXX-XXXX
# 운영에서는 실제 클레임 웹페이지 또는 딥링크 호스트로 교체.
gifticon:
  share-base-url: ${GIFTICON_SHARE_BASE_URL:https://cafeminsu.example/gift}

# 스탬프 적립 정책
# drink-categories: 스탬프 적립 대상(음료)으로 인정할 메뉴 category 목록 (대소문자·공백 무시).
#   매장에서 실제 사용하는 category 값에 맞게 조정하세요.
stamp:
  drink-categories: 커피,음료,에이드,티,스무디,라떼

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# 로깅
logging:
  level:
    root: INFO
    com.cafeminsu: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # SQL 파라미터 값 보고 싶을 때

# 파일 업로드
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-image-bytes: 5242880   # 5MB
